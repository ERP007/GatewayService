server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: lax

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  debug:
    oauth2-token-enabled: ${OAUTH2_TOKEN_DEBUG_ENABLED:false}
    oauth2-token-include-values: ${OAUTH2_TOKEN_DEBUG_INCLUDE_VALUES:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${FRONTEND_BASE_URL:http://localhost:5173}}

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URI:http://user-service:8080}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: item-service
              uri: ${ITEM_SERVICE_URI:http://item-service:8080}
              predicates:
                - Path=/api/items/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URI:http://inventory-service:8080}
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: procurement-service
              uri: ${PROCUREMENT_SERVICE_URI:http://procurement-service:8080}
              predicates:
                - Path=/api/procurement-orders/**
              filters:
                - StripPrefix=1
                - TokenRelay=
            - id: sales-service
              uri: ${SALES_SERVICE_URI:http://sales-service:8080}
              predicates:
                - Path=/api/sales-orders/**
              filters:
                - StripPrefix=1
                - TokenRelay=

  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:erp-client}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.erp007.xyz/realms/master}
            user-name-attribute: sub
