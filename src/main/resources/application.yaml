server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:2h}
      cookie:
        name: ${SESSION_COOKIE_NAME:GATEWAY_SESSION}
        same-site: ${SESSION_COOKIE_SAME_SITE:none}
        secure: ${SESSION_COOKIE_SECURE:true}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  session-invalidation:
    messaging:
      enabled: ${SESSION_INVALIDATION_MESSAGING_ENABLED:true}
      exchange: ${SESSION_INVALIDATION_EXCHANGE:erp.events}
      queue: ${SESSION_INVALIDATION_QUEUE:gateway.user-session-invalidation.q}
      routing-key: ${SESSION_INVALIDATION_ROUTING_KEY:user.authority.changed.gateway}
  debug:
    oauth2-token-enabled: ${OAUTH2_TOKEN_DEBUG_ENABLED:false}
    oauth2-token-include-values: ${OAUTH2_TOKEN_DEBUG_INCLUDE_VALUES:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${FRONTEND_BASE_URL:http://localhost:5173}}

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: gateway-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    data:
      redis:
        repository-type: indexed
        namespace: erp:gateway:session
        flush-mode: on_save

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/users/**

              filters:
                - StripPrefix=1
                - TokenRelay=
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:erp-client}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9001/realms/master}
            user-name-attribute: sub
